<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>searcherism</title>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Comfortaa', sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; position: relative; }

    /* mode switcher */
    .mode-switcher { position: fixed; top: 24px; left: 24px; display: flex; z-index: 100; flex-wrap: wrap; gap: 4px; background: white; border-radius: 8px; padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .mode-btn { font-family: inherit; font-size: .7rem; padding: 4px 10px; cursor: pointer; border: 1px solid #ccc; background: #fff; color: #888; letter-spacing: 1px; text-transform: uppercase; transition: all .15s; border-radius: 4px; }
    .mode-btn.active { background: #222; color: #fff; border-color: #222; }

    h1 { font-size: 2rem; margin: 28px 0 4px; text-align: center; }
    .subtitle { color: #888; margin-bottom: 20px; text-align: center; }

    /* search mode */
    .input-row { display: flex; gap: 8px; }
    input[type=text] { font-family: inherit; font-size: 1.2rem; padding: 8px; flex: 1; text-transform: uppercase; }
    button.action { font-family: inherit; font-size: 1rem; padding: 8px 16px; cursor: pointer; border: 1px solid #ccc; background: #fff; border-radius: 6px; }
    button.action:hover:not(:disabled) { background: #f5f5f5; }
    button:disabled { opacity: .4; cursor: default; }
    .hint { font-size: .8rem; color: #888; margin: 6px 0 0; }
    #status { color: #888; margin: 16px 0; }
    .length-heading { font-size: .75rem; letter-spacing: 2px; text-transform: uppercase; color: #888; margin: 20px 0 8px; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
    .tile-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .word-tile { border: 1px solid #ccc; padding: 4px 10px; font-size: .95rem; border-radius: 4px; }

    /* bingo & 2lw modes */
    #bingo-panel, #twolw-panel { display: none; }
    #bingo-panel.visible, #twolw-panel.visible { display: block; }
    #search-panel.hidden { display: none; }

    .stat-row { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; padding: 12px; background: #f9f9f9; border-radius: 12px; }
    .stat-item { text-align: center; }
    .stat-label { font-size: .7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-size: 1.4rem; font-weight: 700; color: #222; }

    .progress-bar { background: #eee; border-radius: 20px; height: 8px; margin: 16px 0; overflow: hidden; }
    .progress-fill { background: #22c55e; height: 100%; width: 0%; transition: width .3s; border-radius: 20px; }

    .twolw-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; margin: 20px 0; }
    .twolw-card { border: 1px solid #ddd; border-radius: 8px; padding: 10px 4px; text-align: center; cursor: pointer; transition: all .15s; background: #fff; }
    .twolw-card:hover:not(.learned) { border-color: #aaa; transform: translateY(-2px); }
    .twolw-card.learned { background: #f0fdf4; border-color: #22c55e; color: #16a34a; cursor: default; opacity: 0.7; }
    .twolw-card.learned::after { content: " ✓"; font-size: .8rem; }
    .twolw-card.selected { background: #e0e7ff; border-color: #3b82f6; transform: scale(1.02); }
    .twolw-word { font-family: monospace; font-size: 1.1rem; font-weight: 700; letter-spacing: 1px; }
    .twolw-def { font-size: .65rem; color: #888; margin-top: 4px; }

    .quiz-panel { background: #fafafa; border-radius: 16px; padding: 20px; margin: 20px 0; text-align: center; }
    .quiz-prompt { font-size: 1.2rem; margin-bottom: 16px; }
    .quiz-input { font-family: inherit; font-size: 1.5rem; padding: 12px; width: 150px; text-align: center; text-transform: uppercase; border: 2px solid #ccc; border-radius: 12px; letter-spacing: 2px; }
    .quiz-input.correct { border-color: #22c55e; background: #f0fdf4; }
    .quiz-input.wrong { border-color: #ef4444; background: #fef2f2; animation: shake .3s; }
    .quiz-feedback { margin-top: 12px; font-size: .9rem; min-height: 3em; }
    .quiz-hint { font-size: .75rem; color: #888; margin-top: 8px; }

    .action-group { display: flex; gap: 8px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }

    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  </style>
</head>
<body>

  <div class="mode-switcher">
    <button class="mode-btn active" id="btn-search">search</button>
    <button class="mode-btn" id="btn-bingo">bingo</button>
    <button class="mode-btn" id="btn-2lw">2lw</button>
  </div>

  <h1>searcherism</h1>

  <!-- SEARCH PANEL -->
  <div id="search-panel">
    <p class="subtitle">CSW24 subanagram finder</p>
    <div class="input-row">
      <input type="text" id="query" placeholder="e.g. AEEIORT or NO?" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" maxlength="20" />
      <button class="action" id="go" disabled>find</button>
    </div>
    <p class="hint">use ? as a blank &nbsp;·&nbsp; finds all subwords</p>
    <div id="status">loading CSW24…</div>
    <div id="results-area" hidden>
      <p id="count-line"></p>
      <div id="word-grid"></div>
    </div>
  </div>

  <!-- BINGO PANEL -->
  <div id="bingo-panel">
    <p class="subtitle">bingo trainer · CSW24</p>

    <div class="len-row" style="display: flex; gap: 8px; justify-content: center; margin-bottom: 16px;">
      <button class="len-btn active" id="len-7" style="padding: 4px 14px; border: 1px solid #ccc; background: #fff; border-radius: 6px;">7</button>
      <button class="len-btn" id="len-8" style="padding: 4px 14px; border: 1px solid #ccc; background: #fff; border-radius: 6px;">8</button>
    </div>

    <div class="range-row" style="display: flex; gap: 8px; justify-content: center; margin-bottom: 20px;">
      <input type="number" id="range-lo" value="1" min="1" style="width: 70px;" />
      <span>–</span>
      <input type="number" id="range-hi" value="1000" min="1" style="width: 70px;" />
      <button class="action" id="range-go" style="padding: 4px 12px;">go</button>
    </div>

    <div id="bingo-status">loading word list…</div>
    <div class="rack-display" id="rack-display" style="display: flex; gap: 8px; justify-content: center; margin: 20px 0; flex-wrap: wrap;"></div>
    <div class="answer-boxes" id="answer-boxes"></div>
    <div class="bingo-feedback" id="bingo-feedback"></div>
    <div class="action-group">
      <button class="action" id="bingo-submit" disabled>guess</button>
      <button class="action" id="bingo-next" disabled>next word</button>
      <button class="reveal-word" id="bingo-reveal" disabled>reveal</button>
    </div>
    <div class="bingo-stat" id="bingo-stat" style="text-align: center; margin-top: 16px;"></div>
  </div>

  <!-- 2LW RECITATION MODE -->
  <div id="twolw-panel">
    <p class="subtitle">2-letter word recitation · CSW24</p>

    <div class="stat-row">
      <div class="stat-item"><div class="stat-label">learned</div><div class="stat-value" id="learned-count">0</div></div>
      <div class="stat-item"><div class="stat-label">total</div><div class="stat-value" id="total-count">0</div></div>
      <div class="stat-item"><div class="stat-label">mastery</div><div class="stat-value" id="mastery-pct">0%</div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

    <div class="quiz-panel">
      <div class="quiz-prompt">🔤 type the 2-letter word for:</div>
      <div style="font-size: 2rem; font-weight: 700; margin: 12px 0;" id="quiz-definition">---</div>
      <input type="text" id="quiz-input" class="quiz-input" maxlength="2" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="??" />
      <div class="quiz-feedback" id="quiz-feedback"></div>
      <div class="quiz-hint" id="quiz-hint">click a word below to mark as learned / test yourself</div>
      <div class="action-group">
        <button class="action" id="quiz-submit">check</button>
        <button class="action" id="quiz-skip">skip / reveal</button>
        <button class="action" id="quiz-reset">reset all</button>
      </div>
    </div>

    <div id="twolw-grid" class="twolw-grid"></div>
  </div>

<script>
// ── Scrabble bag ─────────────────────────────────────────────────────────────
const BAG = { A:9,B:2,C:2,D:4,E:12,F:2,G:3,H:2,I:9,J:1,K:1,L:4,M:2,N:6,O:8,P:2,Q:1,R:6,S:4,T:6,U:4,V:2,W:2,X:1,Y:2,Z:1 };
const TOTAL = 100;

function comb(n, k) {
  if (k < 0 || k > n) return 0n;
  if (k === 0 || k === n) return 1n;
  k = Math.min(k, n - k);
  let r = 1n;
  for (let i = 0; i < k; i++) r = r * BigInt(n - i) / BigInt(i + 1);
  return r;
}

function wordProbability(word, denom) {
  const freq = {};
  for (const c of word) freq[c] = (freq[c] || 0) + 1;
  for (const [c, cnt] of Object.entries(freq)) {
    if (!BAG[c] || BAG[c] < cnt) return 0;
  }
  let num = 1n;
  for (const [c, cnt] of Object.entries(freq)) num *= comb(BAG[c], cnt);
  return Number(num * 10000000000n / denom) / 10000000000;
}

// ── Word list ─────────────────────────────────────────────────────────────────
const WORD_LIST_URL = "https://raw.githubusercontent.com/katamorphism/searcherism/refs/heads/main/CSW24.txt";
let wordSet = null;
let bingoCache = {};
let twolwList = []; // { word, definition? placeholder }

async function loadWordList() {
  const res = await fetch(WORD_LIST_URL);
  if (!res.ok) throw new Error(`fetch failed: ${res.status}`);
  const text = await res.text();
  wordSet = new Set(text.split(/\r?\n/).map(w => w.trim().toUpperCase()).filter(Boolean));
  
  // extract 2-letter words
  twolwList = [...wordSet].filter(w => w.length === 2).sort();
}

function buildBingoList(len) {
  if (bingoCache[len]) return;
  
  const anagramMap = new Map();
  for (const w of wordSet) {
    if (w.length !== len) continue;
    const key = w.split('').sort().join('');
    if (!anagramMap.has(key)) anagramMap.set(key, []);
    anagramMap.get(key).push(w);
  }
  
  const denom = comb(TOTAL, len);
  const seen = new Set();
  const withProb = [];
  
  for (const w of wordSet) {
    if (w.length !== len) continue;
    const key = w.split('').sort().join('');
    if (seen.has(key)) continue;
    seen.add(key);
    const prob = wordProbability(w, denom);
    if (prob > 0) withProb.push({ key, prob });
  }
  
  withProb.sort((a, b) => b.prob - a.prob);
  withProb.forEach((x, i) => x.rank = i + 1);
  
  bingoCache[len] = { ranked: withProb, anagramMap };
}

// ── Search logic ──────────────────────────────────────────────────────────────
function canMake(letters, blanks, word) {
  const avail = {};
  for (const c of letters) avail[c] = (avail[c] || 0) + 1;
  let bl = blanks;
  for (const c of word) {
    if (avail[c] > 0) avail[c]--;
    else if (bl > 0) bl--;
    else return false;
  }
  return true;
}

function search(query) {
  const upper = query.toUpperCase();
  const blanks = upper.split('').filter(c => c === '?').length;
  const letters = upper.split('').filter(c => c !== '?');
  const maxLen = upper.length;
  const byLength = new Map();
  for (const word of wordSet) {
    if (word.length < 2 || word.length > maxLen) continue;
    if (canMake(letters, blanks, word)) {
      if (!byLength.has(word.length)) byLength.set(word.length, []);
      byLength.get(word.length).push(word);
    }
  }
  for (const [, words] of byLength) words.sort();
  return new Map([...byLength.entries()].sort((a, b) => b[0] - a[0]));
}

// ── Search UI ─────────────────────────────────────────────────────────────────
const queryEl = document.getElementById('query');
const goBtn = document.getElementById('go');
const statusEl = document.getElementById('status');
const resultsArea = document.getElementById('results-area');
const wordGrid = document.getElementById('word-grid');
const countLine = document.getElementById('count-line');

function doSearch() {
  const q = queryEl.value.trim();
  if (!q) return;
  wordGrid.innerHTML = '';
  resultsArea.hidden = true;
  const byLength = search(q);
  let total = 0;
  for (const words of byLength.values()) total += words.length;
  countLine.textContent = `${total} word${total !== 1 ? 's' : ''} found`;
  for (const [len, words] of byLength) {
    const heading = document.createElement('div');
    heading.className = 'length-heading';
    heading.textContent = `${len} letters`;
    wordGrid.appendChild(heading);
    const row = document.createElement('div');
    row.className = 'tile-row';
    for (const w of words) {
      const tile = document.createElement('div');
      tile.className = 'word-tile';
      tile.textContent = w;
      row.appendChild(tile);
    }
    wordGrid.appendChild(row);
  }
  resultsArea.hidden = false;
}

goBtn.addEventListener('click', doSearch);
queryEl.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

// ── Bingo UI ──────────────────────────────────────────────────────────────────
const bingoStatus = document.getElementById('bingo-status');
const rackDisplay = document.getElementById('rack-display');
const answerBoxes = document.getElementById('answer-boxes');
const bingoSubmit = document.getElementById('bingo-submit');
const bingoNext = document.getElementById('bingo-next');
const bingoReveal = document.getElementById('bingo-reveal');
const bingoFeedback = document.getElementById('bingo-feedback');
const bingoStat = document.getElementById('bingo-stat');
const rangeLo = document.getElementById('range-lo');
const rangeHi = document.getElementById('range-hi');
const rangeGo = document.getElementById('range-go');
const len7btn = document.getElementById('len-7');
const len8btn = document.getElementById('len-8');

let currentLen = 7;
let currentEntry = null;
let currentAnagrams = [];
let score = { correct: 0, attempted: 0 };
let revealed = false;
let rangeLoBound = 1;
let rangeHiBound = 1000;

function showRack(key) {
  rackDisplay.innerHTML = '';
  for (const c of key) {
    const tile = document.createElement('div');
    tile.className = 'rack-tile';
    tile.textContent = c;
    rackDisplay.appendChild(tile);
  }
}

function buildAnswerBoxes(count) {
  answerBoxes.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const row = document.createElement('div');
    row.className = 'answer-row';
    if (count > 1) {
      const lbl = document.createElement('span');
      lbl.className = 'answer-label';
      lbl.textContent = `answer ${i + 1}:`;
      row.appendChild(lbl);
    }
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'answer-input';
    inp.maxLength = currentLen;
    inp.autocomplete = 'off';
    inp.autocorrect = 'off';
    inp.setAttribute('autocapitalize', 'characters');
    inp.spellcheck = false;
    inp.placeholder = 'unscramble it…';
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') submitGuess(); });
    row.appendChild(inp);
    answerBoxes.appendChild(row);
  }
}

function getInputs() { return [...answerBoxes.querySelectorAll('.answer-input')]; }
function lockInputs() {
  getInputs().forEach(i => i.disabled = true);
  bingoSubmit.disabled = true;
  bingoReveal.disabled = true;
  bingoNext.disabled = false;
}

function pickEntry() {
  const cache = bingoCache[currentLen];
  if (!cache) return null;
  const lo = rangeLoBound - 1;
  const hi = rangeHiBound;
  const pool = cache.ranked.slice(lo, Math.min(hi, cache.ranked.length));
  if (!pool.length) return null;
  return pool[Math.floor(Math.random() * pool.length)];
}

function newRound() {
  revealed = false;
  bingoFeedback.textContent = '';
  bingoFeedback.className = 'bingo-feedback';
  bingoNext.disabled = true;
  bingoReveal.disabled = false;
  bingoSubmit.disabled = false;
  const entry = pickEntry();
  if (!entry) { bingoStatus.textContent = 'no words in this range'; return; }
  currentEntry = entry;
  currentAnagrams = (bingoCache[currentLen].anagramMap.get(entry.key) || []).slice().sort();
  showRack(entry.key);
  buildAnswerBoxes(currentAnagrams.length);
  getInputs()[0]?.focus();
  const plural = currentAnagrams.length > 1 ? `${currentAnagrams.length} possible answers` : '1 answer';
  bingoStatus.textContent = `rank #${entry.rank} · prob ${(entry.prob * 100).toFixed(4)}% · ${plural}`;
  updateStat();
}

function updateStat() {
  if (score.attempted === 0) { bingoStat.textContent = ''; return; }
  bingoStat.textContent = `score: ${score.correct}/${score.attempted} (${Math.round(score.correct / score.attempted * 100)}%)`;
}

function submitGuess() {
  if (!currentEntry || revealed) return;
  const inputs = getInputs();
  const guesses = inputs.map(i => i.value.trim().toUpperCase());
  if (guesses.every(g => g.length === 0)) return;
  const sortedKey = currentEntry.key;
  let gotOne = false;
  for (const guess of guesses) {
    if (guess.length !== currentLen) continue;
    if (guess.split('').sort().join('') === sortedKey && wordSet.has(guess)) {
      gotOne = true;
      break;
    }
  }
  if (gotOne) {
    score.correct++;
    score.attempted++;
    inputs.forEach(i => i.classList.add('correct'));
    bingoFeedback.textContent = `✓ correct! all answers: ${currentAnagrams.join(', ')}`;
    bingoFeedback.className = 'bingo-feedback correct';
    lockInputs();
  } else {
    inputs.forEach(i => { if (i.value.trim()) { i.classList.add('wrong'); setTimeout(() => i.classList.remove('wrong'), 400); } });
    bingoFeedback.textContent = '✗ nope, try again';
    bingoFeedback.className = 'bingo-feedback wrong';
  }
  updateStat();
}

bingoSubmit.addEventListener('click', submitGuess);
bingoNext.addEventListener('click', newRound);
bingoReveal.addEventListener('click', () => {
  if (!currentEntry || revealed) return;
  revealed = true;
  score.attempted++;
  bingoFeedback.textContent = `answers: ${currentAnagrams.join(', ')}`;
  bingoFeedback.className = 'bingo-feedback info';
  lockInputs();
  updateStat();
});
rangeGo.addEventListener('click', () => {
  const lo = parseInt(rangeLo.value) || 1;
  const hi = parseInt(rangeHi.value) || 1000;
  rangeLoBound = Math.max(1, lo);
  rangeHiBound = Math.max(rangeLoBound, hi);
  if (bingoCache[currentLen]) newRound();
});
[rangeLo, rangeHi].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') rangeGo.click(); }));
len7btn.addEventListener('click', () => { currentLen = 7; len7btn.classList.add('active'); len8btn.classList.remove('active'); if (bingoCache[7]) newRound(); });
len8btn.addEventListener('click', () => { currentLen = 8; len8btn.classList.add('active'); len7btn.classList.remove('active'); if (bingoCache[8]) newRound(); });

// ── 2LW RECITATION MODE ──────────────────────────────────────────────────────
let learnedWords = new Set(); // store learned 2-letter words
let currentQuizWord = null;
let quizMode = 'testing'; // 'testing' or 'reciting'

function loadLearnedFromStorage() {
  const stored = localStorage.getItem('searcherism_2lw_learned');
  if (stored) learnedWords = new Set(JSON.parse(stored));
}

function saveLearnedToStorage() {
  localStorage.setItem('searcherism_2lw_learned', JSON.stringify([...learnedWords]));
}

function updateProgress() {
  const total = twolwList.length;
  const learned = learnedWords.size;
  document.getElementById('learned-count').textContent = learned;
  document.getElementById('total-count').textContent = total;
  const pct = total === 0 ? 0 : Math.round(learned / total * 100);
  document.getElementById('mastery-pct').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;
  
  // update grid classes
  document.querySelectorAll('.twolw-card').forEach(card => {
    const word = card.dataset.word;
    if (learnedWords.has(word)) card.classList.add('learned');
    else card.classList.remove('learned');
  });
}

function renderTwolwGrid() {
  const grid = document.getElementById('twolw-grid');
  grid.innerHTML = '';
  for (const word of twolwList) {
    const card = document.createElement('div');
    card.className = 'twolw-card';
    if (learnedWords.has(word)) card.classList.add('learned');
    card.dataset.word = word;
    card.innerHTML = `<div class="twolw-word">${word}</div><div class="twolw-def">click to mark</div>`;
    card.addEventListener('click', () => {
      if (learnedWords.has(word)) {
        learnedWords.delete(word);
      } else {
        learnedWords.add(word);
      }
      saveLearnedToStorage();
      updateProgress();
      renderTwolwGrid();
    });
    grid.appendChild(card);
  }
}

function pickRandomUnlearned() {
  const unlearned = twolwList.filter(w => !learnedWords.has(w));
  if (unlearned.length === 0) return null;
  return unlearned[Math.floor(Math.random() * unlearned.length)];
}

function startQuiz() {
  const nextWord = pickRandomUnlearned();
  if (!nextWord) {
    document.getElementById('quiz-definition').textContent = '🎉 ALL LEARNED! 🎉';
    document.getElementById('quiz-input').disabled = true;
    document.getElementById('quiz-submit').disabled = true;
    document.getElementById('quiz-feedback').innerHTML = 'Congratulations! You know all 2-letter words!';
    return;
  }
  currentQuizWord = nextWord;
  // generate a simple definition/hint (just show the word scrambled or just "???")
  const scrambled = nextWord.split('').sort().join('');
  document.getElementById('quiz-definition').innerHTML = `"${nextWord}"<br><span style="font-size:0.8rem; color:#888;">${scrambled === nextWord ? 'same letters' : `scrambled: ${scrambled}`}</span>`;
  document.getElementById('quiz-input').value = '';
  document.getElementById('quiz-input').disabled = false;
  document.getElementById('quiz-submit').disabled = false;
  document.getElementById('quiz-input').classList.remove('correct', 'wrong');
  document.getElementById('quiz-feedback').innerHTML = '';
}

function checkQuizAnswer() {
  if (!currentQuizWord) return;
  const guess = document.getElementById('quiz-input').value.trim().toUpperCase();
  if (guess === currentQuizWord) {
    // correct!
    learnedWords.add(currentQuizWord);
    saveLearnedToStorage();
    updateProgress();
    renderTwolwGrid();
    document.getElementById('quiz-input').classList.add('correct');
    document.getElementById('quiz-feedback').innerHTML = '✓ Correct! Learned!';
    setTimeout(() => {
      startQuiz();
    }, 800);
  } else {
    document.getElementById('quiz-input').classList.add('wrong');
    document.getElementById('quiz-feedback').innerHTML = `✗ Incorrect. The word is "${currentQuizWord}". Click next to continue.`;
    setTimeout(() => document.getElementById('quiz-input').classList.remove('wrong'), 500);
  }
}

function skipReveal() {
  if (!currentQuizWord) return;
  document.getElementById('quiz-feedback').innerHTML = `The word is "${currentQuizWord}".`;
  document.getElementById('quiz-input').classList.add('wrong');
  startQuiz();
}

function resetAll() {
  learnedWords.clear();
  saveLearnedToStorage();
  updateProgress();
  renderTwolwGrid();
  startQuiz();
  document.getElementById('quiz-feedback').innerHTML = 'Reset complete! Start learning!';
}

// ── Mode switcher ─────────────────────────────────────────────────────────────
const searchPanel = document.getElementById('search-panel');
const bingoPanel = document.getElementById('bingo-panel');
const twolwPanel = document.getElementById('twolw-panel');
const btnSearch = document.getElementById('btn-search');
const btnBingo = document.getElementById('btn-bingo');
const btn2lw = document.getElementById('btn-2lw');
let bingoReady = false;
let twolwReady = false;

btnSearch.addEventListener('click', () => {
  btnSearch.classList.add('active'); btnBingo.classList.remove('active'); btn2lw.classList.remove('active');
  searchPanel.classList.remove('hidden'); bingoPanel.classList.remove('visible'); twolwPanel.classList.remove('visible');
});

btnBingo.addEventListener('click', async () => {
  btnBingo.classList.add('active'); btnSearch.classList.remove('active'); btn2lw.classList.remove('active');
  searchPanel.classList.add('hidden'); bingoPanel.classList.add('visible'); twolwPanel.classList.remove('visible');
  if (!bingoReady) {
    bingoStatus.textContent = wordSet ? 'computing probabilities…' : 'loading word list…';
    rackDisplay.innerHTML = ''; answerBoxes.innerHTML = '';
    bingoSubmit.disabled = true; bingoNext.disabled = true; bingoReveal.disabled = true;
    try {
      if (!wordSet) await loadWordList();
      buildBingoList(7);
      buildBingoList(8);
      bingoReady = true;
      newRound();
    } catch(e) { bingoStatus.textContent = 'could not load CSW24.txt'; }
  }
});

btn2lw.addEventListener('click', async () => {
  btn2lw.classList.add('active'); btnSearch.classList.remove('active'); btnBingo.classList.remove('active');
  searchPanel.classList.add('hidden'); bingoPanel.classList.remove('visible'); twolwPanel.classList.add('visible');
  if (!twolwReady) {
    try {
      if (!wordSet) await loadWordList();
      loadLearnedFromStorage();
      renderTwolwGrid();
      updateProgress();
      startQuiz();
      twolwReady = true;
    } catch(e) { document.getElementById('twolw-panel').innerHTML = '<p>could not load CSW24.txt</p>'; }
  }
  document.getElementById('quiz-submit').onclick = checkQuizAnswer;
  document.getElementById('quiz-skip').onclick = skipReveal;
  document.getElementById('quiz-reset').onclick = resetAll;
  document.getElementById('quiz-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkQuizAnswer(); });
});

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  try {
    await loadWordList();
    statusEl.textContent = '';
    goBtn.disabled = false;
    queryEl.focus();
  } catch(e) { statusEl.textContent = 'could not load CSW24.txt'; }
})();
</script>
</body>
</html>
